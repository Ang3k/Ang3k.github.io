<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1780" viewBox="0 0 900 1780">
  <title>Fluxo vertical de treino, validação temporal, teste e formação do ensemble</title>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#087f78"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="15" flood-color="#163d3a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="900" height="1780" fill="#f5f9f8"/>
  <text x="450" y="78" fill="#111a1a" font-family="Arial, sans-serif" font-size="50" font-weight="700" text-anchor="middle">Treinar, validar e só</text>
  <text x="450" y="136" fill="#111a1a" font-family="Arial, sans-serif" font-size="50" font-weight="700" text-anchor="middle">depois avaliar</text>
  <text x="450" y="192" fill="#5f6a69" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">O teste permanece isolado enquanto</text>
  <text x="450" y="228" fill="#5f6a69" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">as decisões do ensemble são definidas</text>

  <g filter="url(#shadow)">
    <rect x="90" y="285" width="720" height="190" rx="22" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="90" y="555" width="720" height="190" rx="22" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="90" y="935" width="720" height="190" rx="22" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
  </g>

  <text x="450" y="337" fill="#087f78" font-family="Arial, sans-serif" font-size="31" font-weight="700" text-anchor="middle">TREINO · 2017–2019</text>
  <text x="450" y="398" fill="#111a1a" font-family="Arial, sans-serif" font-size="46" font-weight="700" text-anchor="middle">2.874.235</text>
  <text x="450" y="447" fill="#3e4948" font-family="Arial, sans-serif" font-size="29" text-anchor="middle">registros para aprender os padrões</text>

  <path d="M450 475V535" fill="none" stroke="#087f78" stroke-width="6" marker-end="url(#arrow)"/>

  <text x="450" y="607" fill="#087f78" font-family="Arial, sans-serif" font-size="31" font-weight="700" text-anchor="middle">VALIDAÇÃO · 2020</text>
  <text x="450" y="668" fill="#111a1a" font-family="Arial, sans-serif" font-size="46" font-weight="700" text-anchor="middle">1.331.664</text>
  <text x="450" y="717" fill="#3e4948" font-family="Arial, sans-serif" font-size="29" text-anchor="middle">registros para orientar as decisões</text>

  <path d="M450 745V785" fill="none" stroke="#087f78" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="105" y="805" width="690" height="92" rx="22" fill="#087f78"/>
  <text x="450" y="843" fill="#ffffff" font-family="Arial, sans-serif" font-size="31" font-weight="700" text-anchor="middle">OPTUNA + EARLY STOPPING</text>
  <text x="450" y="878" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">hiperparâmetros, interrupção e pesos</text>

  <path d="M450 897V915" fill="none" stroke="#087f78" stroke-width="6" stroke-dasharray="13 12" marker-end="url(#arrow)"/>

  <text x="450" y="987" fill="#566160" font-family="Arial, sans-serif" font-size="31" font-weight="700" text-anchor="middle">TESTE FINAL · 2021</text>
  <text x="450" y="1048" fill="#111a1a" font-family="Arial, sans-serif" font-size="46" font-weight="700" text-anchor="middle">940.304</text>
  <text x="450" y="1097" fill="#3e4948" font-family="Arial, sans-serif" font-size="29" text-anchor="middle">registros mantidos fora do ajuste</text>

  <text x="450" y="1195" fill="#111a1a" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">PREVISÕES CONGELADAS ANTES DO TESTE</text>

  <g filter="url(#shadow)">
    <rect x="105" y="1240" width="690" height="105" rx="18" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="105" y="1370" width="690" height="105" rx="18" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="105" y="1500" width="690" height="105" rx="18" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
  </g>
  <text x="450" y="1305" fill="#111a1a" font-family="Arial, sans-serif" font-size="37" font-weight="700" text-anchor="middle">SCORE DA MLP</text>
  <text x="450" y="1435" fill="#111a1a" font-family="Arial, sans-serif" font-size="37" font-weight="700" text-anchor="middle">SCORE DO XGBOOST</text>
  <text x="450" y="1565" fill="#111a1a" font-family="Arial, sans-serif" font-size="37" font-weight="700" text-anchor="middle">SCORE DO LIGHTGBM</text>

  <path d="M450 1605V1640" fill="none" stroke="#087f78" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="135" y="1660" width="630" height="82" rx="41" fill="#111a1a"/>
  <text x="450" y="1712" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">SCORE PONDERADO DO ENSEMBLE</text>
</svg>
