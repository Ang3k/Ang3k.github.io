<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>Validação temporal e formação do ensemble</title>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#087f78"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#163d3a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#f5f9f8"/>
  <text x="800" y="78" fill="#111a1a" font-family="Arial, sans-serif" font-size="42" font-weight="600" text-anchor="middle">Treinar, validar e só depois avaliar</text>
  <text x="800" y="122" fill="#5f6a69" font-family="Arial, sans-serif" font-size="23" text-anchor="middle">O ano de teste permanece isolado enquanto todas as decisões do ensemble são definidas</text>

  <g filter="url(#shadow)">
    <rect x="90" y="180" width="390" height="180" rx="20" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="605" y="180" width="390" height="180" rx="20" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="1120" y="180" width="390" height="180" rx="20" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
  </g>

  <text x="285" y="226" fill="#087f78" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">TREINO · 2017–2019</text>
  <text x="285" y="278" fill="#111a1a" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">2.874.235</text>
  <text x="285" y="318" fill="#3e4948" font-family="Arial, sans-serif" font-size="21" text-anchor="middle">registros para aprender os padrões</text>

  <text x="800" y="226" fill="#087f78" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">VALIDAÇÃO · 2020</text>
  <text x="800" y="278" fill="#111a1a" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">1.331.664</text>
  <text x="800" y="318" fill="#3e4948" font-family="Arial, sans-serif" font-size="21" text-anchor="middle">registros para orientar as decisões</text>

  <text x="1315" y="226" fill="#5f6a69" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">TESTE FINAL · 2021</text>
  <text x="1315" y="278" fill="#111a1a" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">940.304</text>
  <text x="1315" y="318" fill="#3e4948" font-family="Arial, sans-serif" font-size="21" text-anchor="middle">registros mantidos fora do ajuste</text>

  <path d="M480 270H580" fill="none" stroke="#087f78" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M995 270H1095" fill="none" stroke="#9ba9a7" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow)"/>

  <rect x="500" y="410" width="600" height="92" rx="18" fill="#087f78"/>
  <text x="800" y="450" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">OPTUNA + EARLY STOPPING</text>
  <text x="800" y="482" fill="#dff5f2" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">hiperparâmetros e momento de interromper o treinamento</text>
  <path d="M800 360V390" fill="none" stroke="#087f78" stroke-width="5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="160" y="570" width="330" height="120" rx="18" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="635" y="570" width="330" height="120" rx="18" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
    <rect x="1110" y="570" width="330" height="120" rx="18" fill="#ffffff" stroke="#ccd8d6" stroke-width="2"/>
  </g>
  <text x="325" y="622" fill="#111a1a" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle">SCORE DA MLP</text>
  <text x="325" y="658" fill="#5f6a69" font-family="Arial, sans-serif" font-size="19" text-anchor="middle">peso definido na validação</text>
  <text x="800" y="622" fill="#111a1a" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle">SCORE DO XGBOOST</text>
  <text x="800" y="658" fill="#5f6a69" font-family="Arial, sans-serif" font-size="19" text-anchor="middle">peso definido na validação</text>
  <text x="1275" y="622" fill="#111a1a" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle">SCORE DO LIGHTGBM</text>
  <text x="1275" y="658" fill="#5f6a69" font-family="Arial, sans-serif" font-size="19" text-anchor="middle">peso definido na validação</text>

  <path d="M325 690V750H800" fill="none" stroke="#087f78" stroke-width="5"/>
  <path d="M800 690V750" fill="none" stroke="#087f78" stroke-width="5"/>
  <path d="M1275 690V750H800" fill="none" stroke="#087f78" stroke-width="5"/>
  <path d="M800 750V790" fill="none" stroke="#087f78" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="535" y="802" width="530" height="68" rx="34" fill="#111a1a"/>
  <text x="800" y="845" fill="#ffffff" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle">SCORE PONDERADO DO ENSEMBLE</text>
</svg>
